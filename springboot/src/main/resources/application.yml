server:
  port: 9090

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:farm_system}?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
# redis
  data:
    redis:
          host: ${REDIS_HOST:localhost}
          port: ${REDIS_PORT:6379}
          password: ${REDIS_PASSWORD:}
          lettuce:
            pool:
              max-active: 8

# 配置mybatis实体和xml映射
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# 文件上传的前缀url
fileBaseUrl: ${FILE_BASE_URL:http://localhost:9090}

file:
  #upload-dir: ${FILE_UPLOAD_DIR:${user.home}/farm-system/uploads}
  upload-dir: ${FILE_UPLOAD_DIR:D:/farm-system/uploads}
  max-upload-size: ${FILE_MAX_UPLOAD_SIZE:5242880}
